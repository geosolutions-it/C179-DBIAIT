{% extends "base.html" %}

{% block content %}
{% if request.user.is_staff or request.user.is_superuser %}

    <div class="container">
        <div class="tab">
            <a href="{% url 'upload-table-view' %}" class="tablinks{% if current_url == 'upload-table-view'%} active{% endif %}">Corrente</a>
            <a href="{% url 'historical-import-view' %}" class="tablinks{% if current_url == 'historical-import-view'%} active{% endif %}">Storico</a>
        </div>
    </div>
    {% block import_content %}
        <div class="container mt-5">
          <form method="post" action="{% url 'start-upload-process' %}" class="mt-5" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mt-5">
                <input type="file" name="upload">
            </div>
            <button type="submit" class="btn btn-info mb-2 btn-block">AVVIA</button>
          </form>
        </div>
        {% if error %}
        <div class="modal fade in" id="error-modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel">
          <div class="modal-dialog" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body text-danger">
                {{ error }}
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-info" data-dismiss="modal">va bene</button>
              </div>
            </div>
          </div>
        </div>
    {% endif %}
    {% endblock %}
<script>
    $(document).ready(function(){
        $("#error-modal").modal('show');
    });
</script>
{% else %}
{% include "errors/denied.html" %}
{% endif %}
{% endblock %}
